spring:
  application:
    name: Office Supply Management System
  
  datasource:
    url: jdbc:mysql://localhost:3306/office_supply_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  flyway:
    enabled: true
    baselineOnMigrate: true
    locations: classpath:db/migration
  
  security:
    user:
      name: admin
      password: admin123

server:
  port: 8080
  servlet:
    context-path: /api
    session:
      timeout: 30m
      persistent: false
  
logging:
  level:
    root: INFO
    com.officesupply: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/application.log
